<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar de Notícias - Qjuris</title>

<style>
body{
margin:0;
font-family:'Segoe UI', Arial;
background:#f4f4f4;
color:#333;
}

/* HEADER */
.header{
background:#212121;
padding:12px 5%;
}
.logo{
color:white;
font-weight:bold;
font-size:1.4rem;
}
.logo span{color:#c04836;}

/* TÍTULO */
.page-title{
text-align:center;
background:#1a3a6d;
color:white;
padding:25px 20px;
}
.page-title h1{
margin:0;
font-size:1.5rem;
color:#f1b44c;
}

/* CONTAINER */
.news-container{
max-width:1100px;
margin:50px auto;
padding:0 20px;
}

/* CARD */
.news-card{
background:white;
padding:25px;
margin-bottom:30px;
border-left:6px solid #f1b44c;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.news-card:hover{
transform:translateY(-4px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.news-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.category{
color:#c04836;
font-weight:bold;
font-size:0.8rem;
text-transform:uppercase;
letter-spacing:1px;
}

.news-card h2{
margin:10px 0;
font-size:1.5rem;
color:#212121;
}

.news-card p{
color:#555;
line-height:1.6;
font-size:0.95rem;
}

.read-more{
display:inline-block;
margin-top:15px;
color:#1a3a6d;
font-weight:bold;
text-decoration:none;
border:2px solid #1a3a6d;
padding:8px 20px;
border-radius:6px;
}

.read-more:hover{
background:#1a3a6d;
color:white;
}

.voltar{
text-align:center;
margin:50px;
}

.voltar a{
background:#c04836;
color:white;
padding:12px 30px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

/* RODAPÉ */
.footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">
Qjuris <span>Simulados</span>
</div>
</div>

<div class="page-title">
<h1>📰 Radar de Notícias OAB</h1>
</div>

<div class="news-container" id="newsContainer"></div>

<div class="voltar">
<a href="index.html">← Voltar ao início</a>
</div>

<div class="footer">
QJuris Simulados e Notícias 2026. Todos os direitos reservados
</div>

<!-- JS -->
<script src="noticias.js?v=3"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const container = document.getElementById("newsContainer");

    if(typeof noticias === "undefined"){
        container.innerHTML = "<p style='text-align:center;'>Erro ao carregar notícias.</p>";
        console.error("noticias.js não carregou");
        return;
    }

    // 🔥 ORDENA POR DATA (MAIS NOVA PRIMEIRO)
    noticias.sort((a, b) => new Date(b.data) - new Date(a.data));

    noticias.forEach(function(n){
        container.innerHTML += `
        <div class="news-card">
            <img src="${n.imagem}" onerror="this.src='https://via.placeholder.com/800x400'">
            <span class="category">${n.categoria}</span>
            <h2>${n.titulo}</h2>
            <p>${n.descricao}</p>
            <a href="${n.link}" class="read-more">LER →</a>
        </div>
        `;
    });

});
</script>

</body>
</html>
